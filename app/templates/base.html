<!doctype html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='img/favicon.ico')}}">

    <!-- Usual bootstrap css, bootstrap js, jquery and material symbols -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,100,1,200"
        rel="stylesheet" />
    <style>
        :root {
            --color-bg: #dbe7e3;
            --color-surface: #eef6f1;
            --color-surface-strong: #d1ded8;
            --color-primary: #1aa077;
            --color-primary-dark: #0c6953;
            --color-secondary: #8e999c;
            --color-text: #152f2a;
            --color-text-muted: #5d6f6b;
            --color-border: #c2d3cd;
            --color-sidebar: #0c6953;
            --color-sidebar-hover: #19a077;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--color-text);
            background-color: var(--color-bg);
            background-image: url("{{ url_for('template_images', path='background.png') }}");
            background-position: center center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        h1, h2, h3, h4, h5, h6 {
            color: var(--color-text);
        }

        a {
            color: var(--color-primary);
        }

        a:hover {
            color: var(--color-primary-dark);
        }

        .btn-primary {
            background-color: var(--color-primary);
            border-color: var(--color-primary);
            color: #fff;
        }

        .btn-primary:hover,
        .btn-primary:focus,
        .btn-primary:active {
            background-color: var(--color-primary-dark);
            border-color: var(--color-primary-dark);
            color: #fff;
        }

        .btn-outline-primary {
            color: var(--color-primary);
            border-color: var(--color-primary);
        }

        .btn-outline-primary:hover,
        .btn-outline-primary:focus,
        .btn-outline-primary:active {
            background-color: rgba(26, 160, 119, 0.10);
            border-color: var(--color-primary-dark);
            color: var(--color-primary-dark);
        }

        .btn-no-bg {
            background-color: transparent !important;
            border-color: transparent !important;
            color: var(--color-primary);
            text-decoration: none;
        }

        .btn-no-bg:hover,
        .btn-no-bg:focus,
        .btn-no-bg:active {
            background-color: rgba(26, 160, 119, 0.08) !important;
            color: var(--color-primary-dark);
        }

        .btn-outline-secondary {
            color: var(--color-primary-dark);
            border-color: var(--color-primary-dark);
        }

        .btn-outline-secondary:hover,
        .btn-outline-secondary:focus {
            background-color: var(--color-primary-dark);
            border-color: var(--color-primary-dark);
            color: #fff;
        }

        .card,
        .card-body,
        .form-control,
        .navbar,
        .alert,
        .toast,
        .tooltip-inner {
            border-radius: 1rem;
        }

        .card,
        .card-body,
        .navbar,
        .alert,
        .toast {
            background-color: #fff;
        }

        .card {
            border: 1px solid var(--color-border);
        }

        .form-control {
            border-color: var(--color-border);
        }

        .form-control:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 0.2rem rgba(26, 160, 119, 0.18);
        }

        .table {
            background-color: #fff;
        }

        .table-striped > tbody > tr:nth-of-type(odd) {
            background-color: var(--color-surface);
        }

        .table th,
        .table td {
            vertical-align: middle;
        }

        .alert {
            border: 1px solid transparent;
        }

        .alert-success {
            background-color: #e8f5ef;
            border-color: #b7d8c8;
            color: #1f5d44;
        }

        .alert-danger {
            background-color: #fdeef0;
            border-color: #f0c0c7;
            color: #8b2838;
        }

        .alert-warning {
            background-color: #f8f3e3;
            border-color: #e2d4b3;
            color: #7b623f;
        }

        .alert-info {
            background-color: #eef7fb;
            border-color: #c7dde6;
            color: #205566;
        }

        .navbar {
            border: 1px solid var(--color-border);
            background-color: var(--color-surface);
        }

        .navbar .btn-outline-secondary {
            color: var(--color-primary-dark);
        }

        .nav-link,
        .navbar-brand {
            color: var(--color-text);
        }

        .nav-link:hover,
        .navbar-brand:hover {
            color: var(--color-primary-dark);
        }

        .text-primary {
            color: var(--color-primary) !important;
        }

        .bg-primary {
            background-color: var(--color-primary) !important;
        }

        .border-primary {
            border-color: var(--color-primary) !important;
        }

        .pagination .page-item.active .page-link,
        .pagination .page-link:focus,
        .pagination .page-link:hover {
            color: #fff;
            background-color: var(--color-primary);
            border-color: var(--color-primary);
        }

        .btn-close {
            filter: invert(35%) sepia(5%) saturate(140%) hue-rotate(150deg) brightness(95%) contrast(86%);
        }

        .toast-header {
            background-color: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
        }

        .toast-body {
            background-color: #fff;
        }

        input::placeholder,
        textarea::placeholder {
            color: var(--color-secondary);
        }

        .bg-primary-custom {
            background-color: var(--color-primary) !important;
        }

        .text-primary-custom {
            color: var(--color-primary) !important;
        }

        .text-muted {
            color: var(--color-text-muted) !important;
        }

        @media (max-width: 767px) {
            #sidebar {
                position: fixed;
                z-index: 999;
                height: 100%;
            }
        }
    </style>

    <!-- Custom css for the page -->
    {% block external_css %}{% endblock %}

    <!-- page specific internal css-->
    {% block internal_css %}{% endblock %}
</head>

<body>
    {% block content %}{% endblock %}

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="appToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true" data-bs-delay="2000">
            <div class="toast-header">
                <strong class="me-auto" id="toastTitle"></strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body" id="toastContent">
                
            </div>
        </div>
    </div>

    {% block external_js %}{% endblock %}
</body>

</html>
