{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="container py-5" style="max-width: 560px;">
    <div class="text-center mb-4">
        <img src="{{ url_for('template_images', path='bigicon.png') }}" alt="Finance Tracker icon" class="d-block mx-auto mb-3" style="height: 88px; width: auto;">
        <h2 class="fw-bold">Create your account</h2>
        <p class="text-muted mb-0">Start tracking monthly spending and budgets.</p>
    </div>

    {% for message in get_flashed_messages(request) %}
        <div class="alert alert-{{ message.type }}" role="alert">{{ message.message }}</div>
    {% endfor %}

    <form class="card shadow-sm p-4" method="POST" action="/register">
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" name="email" type="email" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input class="form-control" name="username" type="text" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input class="form-control" name="password" type="password" minlength="7" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Monthly Income</label>
            <input class="form-control" name="monthly_income" type="number" min="0" step="0.01" value="0">
        </div>
        <div class="d-grid gap-2">
            <button class="btn btn-primary" type="submit">Register</button>
            <a class="btn btn-outline-secondary" href="/login">Back to login</a>
        </div>
    </form>
</div>
{% endblock %}
